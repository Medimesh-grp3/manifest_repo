apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-vitals-deployer
  namespace: medimesh-backend
  labels:
    app: medimesh-vitals
    managed-by: github-actions-oidc
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts", "rollouts/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-vitals-deployer
  namespace: medimesh-backend
  labels:
    app: medimesh-vitals
    managed-by: github-actions-oidc
subjects:
  - kind: User
    name: "github:repo:Medimesh-grp3/medimesh-vital:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: github-actions-vitals-deployer
  apiGroup: rbac.authorization.k8s.io
