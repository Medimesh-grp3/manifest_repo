# ─── MediMesh Frontend Values ─────────────────────────────
name: medimesh-frontend
replicas: 2
image:
  repository: bharath44623/medimesh_medimesh-frontend
  tag: "v0.0.2"
imagePullPolicy: Always
containerPort: 80
service:
  name: medimesh-frontend-svc
  type: ClusterIP
  port: 80
  targetPort: 80
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
sidecar:
  image: busybox:1.36
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
readinessProbe:
  path: /
  port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
livenessProbe:
  path: /
  port: 80
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 3
blueGreen:
  autoPromotionEnabled: false
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 60
gateway:
  enabled: true
  name: medimesh-gateway
  className: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  httpRoute:
    name: medimesh-routes
namespaces:
  frontend: medimesh-frontend
  backend: medimesh-backend
