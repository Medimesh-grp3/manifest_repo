# Frontend Rollout - Blue/Green Strategy
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespaces.frontend }}
  labels:
    app: {{ .Values.name }}
    tier: frontend
    app.kubernetes.io/part-of: medimesh
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
      tier: frontend
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        tier: frontend
    spec:
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
              protocol: TCP
          env:
            - name: BFF_SERVICE_URL
              value: "http://medimesh-bff-svc.{{ .Values.namespaces.backend }}.svc.cluster.local:5010"
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
        # Log aggregator sidecar
        - name: log-sidecar
          image: {{ .Values.sidecar.image }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "while true; do tail -f /var/log/nginx/access.log /var/log/nginx/error.log 2>/dev/null; sleep 2; done"]
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: {{ .Values.sidecar.resources.requests.cpu | quote }}
              memory: {{ .Values.sidecar.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.sidecar.resources.limits.cpu | quote }}
              memory: {{ .Values.sidecar.resources.limits.memory | quote }}
      volumes:
        - name: nginx-logs
          emptyDir: {}
  strategy:
    blueGreen:
      activeService: {{ .Values.service.name }}
      previewService: {{ .Values.service.name }}-preview
      autoPromotionEnabled: false
