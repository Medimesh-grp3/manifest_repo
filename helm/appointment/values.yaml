# ─── MediMesh Appointment Service Values ──────────────────
name: medimesh-appointment
replicas: 2
image:
  repository: bharath44623/medimesh_medimesh-appointment
  tag: "v0.1.4"
imagePullPolicy: Always
containerPort: 5004
dbName: medimesh-appointment-db
service:
  name: medimesh-appointment-svc
  port: 5004
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
extraEnv: []
# Previously global values — now local
namespaces:
  backend: medimesh-backend
  db: medimesh-db
mongo:
  host: medimesh-mongodb
  port: 27017
  replicaSet: rs0
