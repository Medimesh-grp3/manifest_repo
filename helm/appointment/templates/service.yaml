# appointment Service - Active (Blue)
apiVersion: v1
kind: Service
metadata:
  name: medimesh-appointment-svc
  namespace: {{ .Values.namespaces.backend }}
  labels:
    app: {{ .Values.name }}
    tier: backend
spec:
  selector:
    app: {{ .Values.name }}
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
---
# appointment Service - Preview (Green)
apiVersion: v1
kind: Service
metadata:
  name: medimesh-appointment-svc-preview
  namespace: {{ .Values.namespaces.backend }}
  labels:
    app: {{ .Values.name }}
    tier: backend
spec:
  selector:
    app: {{ .Values.name }}
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
