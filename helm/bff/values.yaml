# ─── MediMesh BFF Values ──────────────────────────────────
name: medimesh-bff
replicas: 2
image:
  repository: bharath44623/medimesh_medimesh-bff
  tag: "v0.0.2"
imagePullPolicy: Always
containerPort: 5010
service:
  name: medimesh-bff-svc
  type: ClusterIP
  port: 5010
  targetPort: 5010
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
readinessProbe:
  path: /health
  port: 5010
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
livenessProbe:
  path: /health
  port: 5010
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
strategy:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 1
# Previously global values — now local
namespaces:
  backend: medimesh-backend

extraEnv:
  - name: AUTH_SERVICE_URL
    value: "http://medimesh-auth-svc.medimesh-backend.svc.cluster.local:5001"
  - name: USER_SERVICE_URL
    value: "http://medimesh-user-svc.medimesh-backend.svc.cluster.local:5002"
  - name: DOCTOR_SERVICE_URL
    value: "http://medimesh-doctor-svc.medimesh-backend.svc.cluster.local:5003"
  - name: APPOINTMENT_SERVICE_URL
    value: "http://medimesh-appointment-svc.medimesh-backend.svc.cluster.local:5004"
  - name: VITALS_SERVICE_URL
    value: "http://medimesh-vitals-svc.medimesh-backend.svc.cluster.local:5005"
  - name: PHARMACY_SERVICE_URL
    value: "http://medimesh-pharmacy-svc.medimesh-backend.svc.cluster.local:5006"
  - name: AMBULANCE_SERVICE_URL
    value: "http://medimesh-ambulance-svc.medimesh-backend.svc.cluster.local:5007"
  - name: COMPLAINT_SERVICE_URL
    value: "http://medimesh-complaint-svc.medimesh-backend.svc.cluster.local:5008"
  - name: FORUM_SERVICE_URL
    value: "http://medimesh-forum-svc.medimesh-backend.svc.cluster.local:5009"
